services:
  # =========================
  # DEV: Hot reload
  # =========================
  admission-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --force && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3001:3000"
    volumes:
      - ./:/app
      - admission_node_modules:/app/node_modules
      - admission_next_cache:/app/.next
    env_file:
      - .env
      - .env.sentry-build-plugin
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    profiles: ["dev"]

  # =========================
  # PROD: Next build + start
  # =========================
  admission-prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    env_file:
      - .env
      - .env.sentry-build-plugin
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
    restart: unless-stopped
    profiles: ["prod"]

volumes:
  admission_node_modules:
  admission_next_cache: